version: '3.9'
services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/badminton-shop
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
      PORT: 5000
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:5000
    ports:
      - '5173:80'
    depends_on:
      - backend
volumes:
  mongo-data:
